<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View product details on City Find - Global Business Platform">
    <meta name="robots" content="index, follow">
    <title>Product - City Find</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(0, 242, 254, 0.5);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,242,254,0.3);
            border-top-color: #00f2fe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .product-image {
            transition: transform 0.3s ease;
        }
        .product-image:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white">
    <div class="container mx-auto px-4 py-8">
        <div class="glass-card p-8 max-w-5xl mx-auto">
            <div id="productContent">
                <div class="text-center py-12">
                    <div class="loading-spinner mx-auto"></div>
                    <p class="mt-4 text-gray-400">Loading product details...</p>
                </div>
            </div>
            <div class="mt-8 flex gap-4 justify-center flex-wrap">
                <button onclick="window.location.href='/'" class="bg-cyan-500 px-6 py-2 rounded-full hover:bg-cyan-600 transition">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Home
                </button>
                <button onclick="shareProduct()" class="bg-purple-500 px-6 py-2 rounded-full hover:bg-purple-600 transition">
                    <i class="fas fa-share-alt mr-2"></i> Share Product
                </button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let currentProduct = null;
        
        async function loadProduct() {
            if (!productId) {
                document.getElementById('productContent').innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-exclamation-triangle text-5xl text-red-400 mb-4"></i>
                        <h2 class="text-2xl font-bold mb-2">Product Not Found</h2>
                        <p class="text-gray-400">The product you're looking for doesn't exist.</p>
                    </div>
                `;
                return;
            }
            
            try {
                // Fetch all ads and find specific product
                const res = await fetch('/api/ads');
                const ads = await res.json();
                const product = ads.find(a => a._id === productId);
                
                if (!product) {
                    document.getElementById('productContent').innerHTML = `
                        <div class="text-center py-12">
                            <i class="fas fa-exclamation-triangle text-5xl text-red-400 mb-4"></i>
                            <h2 class="text-2xl font-bold mb-2">Product Not Found</h2>
                            <p class="text-gray-400">This product may have been removed or expired.</p>
                        </div>
                    `;
                    return;
                }
                
                currentProduct = product;
                
                // Update page title for SEO
                document.title = `${product.title} | City Find`;
                
                // Get galaxy animation class
                const galaxyClass = getGalaxyClass(product.galaxyAnimation);
                
                // Display product content
                document.getElementById('productContent').innerHTML = `
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="product-image ${galaxyClass}">
                            ${product.mediaUrls && product.mediaUrls[0] ? 
                                `<img src="${product.mediaUrls[0]}" class="w-full rounded-lg shadow-lg" alt="${product.title}">` : 
                                `<div class="w-full h-96 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-lg flex items-center justify-center">
                                    <i class="fas fa-image text-6xl text-gray-500"></i>
                                </div>`
                            }
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-3 flex-wrap">
                                <span class="px-3 py-1 bg-cyan-500/30 rounded-full text-sm">${product.adType || 'Banner'}</span>
                                <span class="px-3 py-1 bg-purple-500/30 rounded-full text-sm">${product.category || 'General'}</span>
                                ${product.status === 'active' ? 
                                    '<span class="px-3 py-1 bg-green-500/30 rounded-full text-sm"><i class="fas fa-check-circle"></i> Active</span>' : 
                                    '<span class="px-3 py-1 bg-yellow-500/30 rounded-full text-sm"><i class="fas fa-clock"></i> Pending</span>'
                                }
                            </div>
                            <h1 class="text-3xl font-bold mb-4">${escapeHtml(product.title)}</h1>
                            <p class="text-gray-300 mb-6 leading-relaxed">${escapeHtml(product.description)}</p>
                            
                            <div class="border-t border-white/10 pt-4 mb-6">
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <span class="text-gray-400 text-sm">Price</span>
                                        <p class="text-2xl font-bold text-cyan-400">${product.currency || 'USD'} ${product.price || 0}</p>
                                    </div>
                                    <div>
                                        <span class="text-gray-400 text-sm">Seller Rating</span>
                                        <p class="text-yellow-400 text-lg">⭐ ${product.companyId?.rating || 5}/5</p>
                                    </div>
                                    <div>
                                        <span class="text-gray-400 text-sm">Category</span>
                                        <p class="capitalize">${product.category || 'General'}</p>
                                    </div>
                                    <div>
                                        <span class="text-gray-400 text-sm">Posted</span>
                                        <p>${new Date(product.createdAt).toLocaleDateString()}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex gap-3 flex-wrap">
                                <button onclick="contactSeller('${product.companyId?._id}')" class="flex-1 bg-green-600 py-3 rounded-full hover:bg-green-700 transition">
                                    <i class="fab fa-whatsapp mr-2"></i> Contact Seller
                                </button>
                                <button onclick="window.location.href='/'" class="flex-1 bg-cyan-600 py-3 rounded-full hover:bg-cyan-700 transition">
                                    <i class="fas fa-search mr-2"></i> Browse More Ads
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 pt-6 border-t border-white/10">
                        <h3 class="text-lg font-bold mb-3">Share this product</h3>
                        <div class="flex gap-3 flex-wrap">
                            <button onclick="shareOn('whatsapp')" class="bg-green-600 px-4 py-2 rounded-full hover:bg-green-700 transition text-sm">
                                <i class="fab fa-whatsapp mr-2"></i> WhatsApp
                            </button>
                            <button onclick="shareOn('facebook')" class="bg-blue-600 px-4 py-2 rounded-full hover:bg-blue-700 transition text-sm">
                                <i class="fab fa-facebook mr-2"></i> Facebook
                            </button>
                            <button onclick="shareOn('twitter')" class="bg-black px-4 py-2 rounded-full hover:bg-gray-800 transition text-sm">
                                <i class="fab fa-twitter mr-2"></i> Twitter
                            </button>
                            <button onclick="shareOn('linkedin')" class="bg-blue-800 px-4 py-2 rounded-full hover:bg-blue-900 transition text-sm">
                                <i class="fab fa-linkedin mr-2"></i> LinkedIn
                            </button>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading product:', error);
                document.getElementById('productContent').innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-exclamation-triangle text-5xl text-red-400 mb-4"></i>
                        <h2 class="text-2xl font-bold mb-2">Error Loading Product</h2>
                        <p class="text-gray-400">Please try again later or contact support.</p>
                        <button onclick="location.reload()" class="mt-4 bg-cyan-500 px-4 py-2 rounded-full">Retry</button>
                    </div>
                `;
            }
        }
        
        function getGalaxyClass(animation) {
            const map = {
                'spiral_galaxy': 'galaxy-spiral',
                'exploding_stars': 'galaxy-explode',
                'nebula_cloud': 'galaxy-nebula',
                'black_hole_pulse': 'galaxy-blackhole'
            };
            return map[animation] || '';
        }
        
        function contactSeller(sellerId) {
            window.open('https://wa.me/255796323348?text=I%27m%20interested%20in%20this%20product%20on%20City%20Find', '_blank');
        }
        
        function shareProduct() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`Check out this product on City Find! ${currentProduct?.title || 'Amazing product'}`);
            window.open(`https://wa.me/?text=${text}%20${url}`, '_blank');
        }
        
        function shareOn(platform) {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(currentProduct?.title || 'City Find Product');
            
            const shareUrls = {
                whatsapp: `https://wa.me/?text=${title}%20${url}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
                twitter: `https://twitter.com/intent/tweet?text=${title}&url=${url}`,
                linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${url}`
            };
            
            if (shareUrls[platform]) {
                window.open(shareUrls[platform], '_blank');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Load product on page load
        loadProduct();
    </script>
    
    <style>
        .galaxy-spiral { animation: spiralPulse 8s ease-in-out infinite; }
        .galaxy-explode { animation: explodePulse 6s ease-in-out infinite; }
        .galaxy-nebula { animation: nebulaFloat 10s ease-in-out infinite; }
        .galaxy-blackhole { animation: blackholePulse 7s ease-in-out infinite; }
        
        @keyframes spiralPulse {
            0%, 100% { transform: rotate(0deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(3deg) scale(1.02); opacity: 1; }
        }
        @keyframes explodePulse {
            0%, 100% { filter: brightness(1) blur(0px); }
            50% { filter: brightness(1.3) blur(1px); }
        }
        @keyframes nebulaFloat {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-5px) scale(1.01); }
        }
        @keyframes blackholePulse {
            0%, 100% { filter: drop-shadow(0 0 15px #9b51e0); }
            50% { filter: drop-shadow(0 0 35px #00f2fe); }
        }
    </style>
</body>
</html>
